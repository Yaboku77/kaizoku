
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy Free Cash Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        swiggy: '#fc8019',
                        swiggyDark: '#e37316'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex justify-center font-sans">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-6 my-4 border border-gray-100">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">🎁 Swiggy Rewards</h1>
            <p class="text-gray-600 font-medium">Sabhi links par ek ek karke click karo and free cash lelo 😁</p>
        </div>

        <!-- Buttons Grid -->
        <div class="flex flex-col gap-3" id="links-container">
            <!-- Buttons will be injected here via JavaScript -->
        </div>
        
        <div class="mt-8 text-center text-sm text-gray-400">
            <p>Note: Make sure your Swiggy app is installed and logged in.</p>
        </div>
    </div>

    <script>
        const links = [
            "https://r.swiggy.com/fathersday/fathers_day-29Rkoa4bF4",
            "https://r.swiggy.com/fathersday/fathers_day-1rOlSwiYcr",
            "https://r.swiggy.com/fathersday/fathers_day-29RkoOEOk2",
            "https://r.swiggy.com/fathersday/fathers_day-1xqP5cRDpQ",
            "https://r.swiggy.com/fathersday/fathers_day-CGXTpdNao",
            "https://r.swiggy.com/fathersday/fathers_day-5otrAnpaj",
            "https://r.swiggy.com/fathersday/fathers_day-3VyuWLs1Uv3",
            "https://r.swiggy.com/fathersday/fathers_day-3OpRLomFJJE",
            "https://r.swiggy.com/fathersday/fathers_day-3RNHLpyLyK",
            "https://r.swiggy.com/fathersday/fathers_day-1rOlSvSQ6f",
            "https://r.swiggy.com/fathersday/fathers_day-3RNHLpyLyK",
            "https://r.swiggy.com/fathersday/fathers_day-9ggQo4GQJ"
        ];

        const container = document.getElementById('links-container');

        links.forEach((link, index) => {
            const a = document.createElement('a');
            a.href = link;
            a.target = "_blank"; // Opens in a new tab
            a.rel = "noopener noreferrer";
            a.className = "group w-full flex items-center justify-between bg-swiggy hover:bg-swiggyDark text-white font-semibold py-3 px-5 rounded-xl transition-all duration-200 shadow-md hover:shadow-lg active:scale-[0.98]";
            
            a.innerHTML = `
                <span>Claim Link ${index + 1}</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:translate-x-1 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            `;
            
            container.appendChild(a);
        });
    </script>
</body>
</html>
